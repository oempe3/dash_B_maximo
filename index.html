<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Painel Operacional · Turma B · Manutenção & Operação</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --surface-0:#0b0f14;--surface-1:#11161d;--surface-2:#161d26;--surface-3:#1c2530;--surface-4:#222d3a;
  --line:rgba(255,255,255,.06);--line-strong:rgba(255,255,255,.12);
  --text:#e7ecf3;--text-mute:#9aa6b6;--text-dim:#6a7689;
  --op:#22d3ee;--op-2:#06b6d4;--op-soft:rgba(34,211,238,.12);
  --m-corr:#ef4444;--m-em:#dc2626;--m-pred:#f97316;--m-prev:#f59e0b;--m-serv:#eab308;--m-modi:#a16207;
  --maint:#f59e0b;--maint-soft:rgba(245,158,11,.12);
  --radius-lg:22px;--radius-md:16px;--radius-sm:10px;
  --shadow-1:0 1px 0 rgba(255,255,255,.04) inset,0 8px 24px rgba(0,0,0,.35);
  --shadow-2:0 1px 0 rgba(255,255,255,.04) inset,0 16px 40px rgba(0,0,0,.45);
}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:'Inter Tight',system-ui,sans-serif;background:radial-gradient(1100px 600px at 90% -10%,rgba(34,211,238,.08),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(245,158,11,.07),transparent 60%),var(--surface-0);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:.005em}

/* ===== App Bar ===== */
.appbar{position:sticky;top:0;z-index:30;background:rgba(11,15,20,.78);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--line)}
.appbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:14px 22px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand-mark{width:38px;height:38px;border-radius:12px;background:conic-gradient(from 200deg at 50% 50%,var(--op) 0deg,var(--maint) 140deg,var(--op) 360deg);position:relative;box-shadow:0 4px 14px rgba(34,211,238,.25),0 4px 14px rgba(245,158,11,.18);flex-shrink:0}
.brand-mark::after{content:"";position:absolute;inset:5px;border-radius:8px;background:var(--surface-1)}
.brand-text{display:flex;flex-direction:column;line-height:1.05;min-width:0}
.brand-text .t{font-family:'Outfit',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.01em}
.brand-text .s{font-size:11px;color:var(--text-mute);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.appbar-spacer{flex:1}
.appbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* Refresh btn */
.btn-refresh{
  appearance:none;border:1px solid var(--line-strong);background:var(--surface-2);color:var(--text);
  font-family:'Inter Tight',sans-serif;font-size:12px;font-weight:600;
  padding:9px 16px;border-radius:999px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  transition:all .25s ease;white-space:nowrap;
}
.btn-refresh:hover{background:var(--surface-3);border-color:var(--op);color:var(--op)}
.btn-refresh.loading{pointer-events:none;opacity:.7}
.btn-refresh.loading .ico{animation:spin .8s linear infinite}
.btn-refresh.done{border-color:rgba(34,197,94,.4);color:#22c55e}
.btn-refresh .ico{width:16px;height:16px;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

.btn-refresh .status{font-size:10px;color:var(--text-dim);margin-left:2px}

.op-filter{display:flex;gap:6px;align-items:center;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:4px}
.op-filter select{appearance:none;background:transparent;color:var(--text);border:0;outline:0;font-family:inherit;font-size:13px;font-weight:500;padding:8px 28px 8px 14px;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M1 3l4 4 4-4' stroke='%239aa6b6' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 10px center}
.op-filter select option{background:var(--surface-2);color:var(--text)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:90;background:var(--surface-3);border:1px solid var(--line-strong);border-radius:14px;padding:12px 20px;font-size:13px;font-weight:500;box-shadow:var(--shadow-2);opacity:0;transition:all .4s cubic-bezier(.2,.8,.2,1);pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(239,68,68,.4);color:#fca5a5}
.toast.success{border-color:rgba(34,197,94,.4);color:#86efac}

/* ===== Tabs ===== */
.tabs-wrap{max-width:1400px;margin:0 auto;padding:18px 22px 0}
.tabs{display:flex;gap:8px;flex-wrap:wrap;background:var(--surface-1);border:1px solid var(--line);padding:6px;border-radius:16px;width:fit-content;max-width:100%}
.tab{appearance:none;border:0;background:transparent;color:var(--text-mute);font-family:'Outfit',sans-serif;font-weight:600;font-size:13px;letter-spacing:.02em;padding:10px 18px;border-radius:11px;cursor:pointer;transition:all .25s ease;display:flex;flex-direction:column;align-items:center;gap:1px;line-height:1.1}
.tab .tab-sub{font-size:10px;font-weight:500;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase}
.tab:hover{color:var(--text);background:rgba(255,255,255,.03)}
.tab.active{background:linear-gradient(180deg,rgba(34,211,238,.18),rgba(34,211,238,.06));color:var(--text);box-shadow:0 0 0 1px rgba(34,211,238,.35) inset,0 6px 18px rgba(34,211,238,.10)}
.tab.active .tab-sub{color:var(--op)}
.tab.tab-anual{background:linear-gradient(180deg,rgba(245,158,11,.16),rgba(34,211,238,.10))}
.tab.tab-anual.active{background:linear-gradient(180deg,rgba(245,158,11,.28),rgba(34,211,238,.18));box-shadow:0 0 0 1px rgba(245,158,11,.35) inset,0 6px 18px rgba(245,158,11,.12)}
.tab.tab-new{animation:tabPulse 2s ease-in-out 3}
@keyframes tabPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 2px rgba(34,197,94,.5),0 0 20px rgba(34,197,94,.15)}}

/* ===== Main ===== */
.main{max-width:1400px;margin:0 auto;padding:18px 22px 60px}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:14px 4px 14px;flex-wrap:wrap}
.section-head h2{font-family:'Outfit',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.015em;margin:0}
.section-head .sub{font-size:13px;color:var(--text-mute)}
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--line);padding:6px 12px;border-radius:999px;font-size:12px;color:var(--text-mute);font-weight:500}
.pill .dot{width:7px;height:7px;border-radius:99px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-top:8px}
.kpi{position:relative;overflow:hidden;background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:18px 18px 16px;box-shadow:var(--shadow-1);transition:transform .35s cubic-bezier(.2,.8,.2,1),border-color .25s;animation:kpiIn .55s cubic-bezier(.2,.8,.2,1) both}
.kpi:nth-child(1){animation-delay:.02s}.kpi:nth-child(2){animation-delay:.07s}.kpi:nth-child(3){animation-delay:.12s}.kpi:nth-child(4){animation-delay:.17s}.kpi:nth-child(5){animation-delay:.22s}.kpi:nth-child(6){animation-delay:.27s}
.kpi:hover{transform:translateY(-2px);border-color:var(--line-strong)}
@keyframes kpiIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kpi .label{font-size:11px;color:var(--text-mute);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.kpi .value{font-family:'Outfit',sans-serif;font-weight:700;font-size:34px;letter-spacing:-.025em;margin-top:6px;line-height:1;display:flex;align-items:baseline;gap:6px}
.kpi .value .unit{font-size:13px;color:var(--text-mute);font-weight:500;letter-spacing:0}
.kpi .meta{font-size:12px;color:var(--text-dim);margin-top:6px}
.kpi .badge{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface-3);font-size:14px}
.kpi.kpi-op .badge{background:var(--op-soft);color:var(--op)}.kpi.kpi-manut .badge{background:var(--maint-soft);color:var(--maint)}
.kpi.kpi-op .value{color:var(--op)}.kpi.kpi-manut .value{color:var(--maint)}
.kpi.kpi-op::after,.kpi.kpi-manut::after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px}
.kpi.kpi-op::after{background:linear-gradient(90deg,var(--op),transparent)}.kpi.kpi-manut::after{background:linear-gradient(90deg,var(--maint),transparent)}

/* Cards */
.grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-top:18px}
@media(max-width:980px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--surface-1);border:1px solid var(--line);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-1)}
.card h3{font-family:'Outfit',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.01em;margin:0 0 4px}
.card .card-sub{font-size:12px;color:var(--text-mute);margin-bottom:16px}

/* Chart */
.chart-legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:var(--text-mute)}
.legend-item .swatch{width:12px;height:12px;border-radius:3px;display:inline-block}
.legend-item .swatch.op{background:var(--op)}.legend-item .swatch.manut{background:var(--maint)}
.chart-scroll{overflow-x:auto;overflow-y:visible;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.chart-scroll::-webkit-scrollbar{height:8px}.chart-scroll::-webkit-scrollbar-track{background:transparent}.chart-scroll::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:4px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:300px;padding:14px 4px 30px;position:relative;min-width:100%}
.bar-grid{position:absolute;left:36px;right:0;top:14px;bottom:30px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.bar-grid .gline{height:1px;background:var(--line);position:relative}
.bar-grid .gline::before{content:attr(data-v);position:absolute;left:-32px;top:-7px;font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace}
.bar-col{flex:1 1 0;min-width:22px;max-width:60px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;height:100%;padding-left:2px;padding-right:2px}
.bar-stack{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
.bar-pair{display:flex;gap:3px;width:100%;flex:1;align-items:flex-end}
.bar{flex:1;border-radius:6px 6px 2px 2px;position:relative;cursor:pointer;transition:filter .15s ease,transform .15s ease;min-height:0;animation:barRise .6s cubic-bezier(.2,.8,.2,1) both}
.bar:hover{filter:brightness(1.18);transform:translateY(-1px)}
.bar.bar-op{background:linear-gradient(180deg,var(--op),var(--op-2));box-shadow:0 0 12px rgba(34,211,238,.25)}
.bar.bar-manut{background:linear-gradient(180deg,var(--m-prev),var(--m-modi));box-shadow:0 0 12px rgba(245,158,11,.25)}
@keyframes barRise{from{opacity:0;transform:scaleY(.2);transform-origin:bottom}to{opacity:1;transform:scaleY(1)}}
.bar-label{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);white-space:nowrap}

/* Tooltip */
.tooltip{position:fixed;z-index:80;background:rgba(17,22,29,.96);backdrop-filter:blur(10px);border:1px solid var(--line-strong);border-radius:14px;padding:12px 14px;min-width:240px;box-shadow:var(--shadow-2);color:var(--text);font-size:12px;pointer-events:none;opacity:0;transform:translateY(4px);transition:opacity .12s ease,transform .12s ease}
.tooltip.show{opacity:1;transform:translateY(0)}
.tt-head{display:flex;justify-content:space-between;align-items:baseline;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.tt-head .dia{color:var(--text-mute);font-size:11px;font-weight:500}
.tt-section{margin-top:8px}.tt-section:first-of-type{margin-top:0}
.tt-section-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tt-section-title .dot{width:7px;height:7px;border-radius:2px}
.tt-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.tt-row .lhs{display:flex;align-items:center;gap:8px}
.tt-row .swatch{width:10px;height:10px;border-radius:3px;display:inline-block}
.tt-row .name{color:var(--text-mute)}.tt-row .val{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--text)}
.tt-total{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);display:flex;justify-content:space-between;font-weight:700;font-size:13px}

/* OS list */
.os-list{display:flex;flex-direction:column;gap:8px}
.os-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;background:var(--surface-2);border:1px solid var(--line);transition:all .2s ease}
.os-item:hover{border-color:var(--line-strong);transform:translateX(2px)}
.os-item .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.os-item .label{flex:1;font-weight:600;font-size:13px;display:flex;flex-direction:column;gap:1px}
.os-item .label .full{font-size:10px;font-weight:500;color:var(--text-dim);letter-spacing:.04em;text-transform:uppercase}
.os-item .count{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px}
.os-summary{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface-2);border:1px solid var(--line);border-radius:14px;margin-bottom:12px}
.os-summary .label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-mute);font-weight:600}
.os-summary .val{font-family:'Outfit',sans-serif;font-weight:700;font-size:28px;letter-spacing:-.02em}

/* Breakdown */
.breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}
.bd-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:11px}
.bd-row .swatch{width:8px;height:24px;border-radius:3px;flex-shrink:0}
.bd-row .info{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.bd-row .name{font-size:12px;font-weight:600;color:var(--text)}
.bd-row .full{font-size:10px;color:var(--text-dim)}
.bd-row .v{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px}

.empty{text-align:center;padding:50px 20px;color:var(--text-dim);font-size:13px}

/* Footer */
.footer{max-width:1400px;margin:0 auto;padding:24px 22px 40px;border-top:1px solid var(--line);margin-top:30px;font-size:12px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer code{font-family:'JetBrains Mono',monospace;background:var(--surface-2);padding:2px 6px;border-radius:5px;color:var(--text-mute)}

/* Logos no header */
.appbar-logos{display:flex;gap:12px;align-items:center;margin-left:auto}
.appbar-logos a{display:block;transition:opacity .2s;text-decoration:none}
.appbar-logos a:hover{opacity:.8}
.appbar-logos img{height:32px;width:auto;display:block}

/* Botão copiar */
.btn-copy{appearance:none;border:1px solid var(--line);background:transparent;color:var(--text-dim);cursor:pointer;padding:4px 8px;border-radius:6px;font-size:11px;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.btn-copy:hover{border-color:var(--op);color:var(--op);background:var(--op-soft)}
.btn-copy.copied{border-color:rgba(34,197,94,.4);color:#22c55e}

/* Gauge Chart */
.gauge-container{position:relative;width:100%;max-width:300px;margin:20px auto}
.gauge-svg{width:100%;height:auto;display:block}
.gauge-label{text-align:center;font-size:12px;color:var(--text-mute);margin-top:8px}

/* Date Filter */
.date-filter{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.date-filter label{font-size:12px;color:var(--text-mute);font-weight:500}
.date-filter input[type="date"]{background:var(--surface-2);border:1px solid var(--line);color:var(--text);padding:6px 10px;border-radius:8px;font-family:inherit;font-size:12px}
.date-filter button{appearance:none;background:var(--op);color:var(--surface-0);border:0;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.date-filter button:hover{background:var(--op-2);transform:translateY(-1px)}

@media(max-width:680px){
  .appbar-inner{padding:12px 16px;gap:10px}
  .brand-text .t{font-size:15px}.brand-text .s{font-size:10px}
  .appbar-logos img{height:24px}
  .tabs-wrap,.main,.footer{padding-left:14px;padding-right:14px}
  .tab{padding:8px 12px;font-size:12px}
  .kpi{padding:14px}.kpi .value{font-size:26px}
  .card{padding:16px}.breakdown{grid-template-columns:1fr}
  .section-head h2{font-size:22px}
}
</style>
</head>

<script>
(function(){
"use strict";

// ===================== CONSTANTS =====================
const TIPOS_OPER=["OPER"],TIPOS_MANUT=["CORR","EM","PRED","PREV","SERV","MODI"],ALL_TIPOS=[...TIPOS_OPER,...TIPOS_MANUT];
const MANUT_LABELS={CORR:{nome:"Corretiva",cor:"var(--m-corr)"},EM:{nome:"Emergencial",cor:"var(--m-em)"},PRED:{nome:"Preditiva",cor:"var(--m-pred)"},PREV:{nome:"Preventiva",cor:"var(--m-prev)"},SERV:{nome:"Serviços",cor:"var(--m-serv)"},MODI:{nome:"Modificativa",cor:"var(--m-modi)"}};
const OPER_LABEL={nome:"Operacional",cor:"var(--op)"};
const MES_NOMES={"01":"Janeiro","02":"Fevereiro","03":"Março","04":"Abril","05":"Maio","06":"Junho","07":"Julho","08":"Agosto","09":"Setembro","10":"Outubro","11":"Novembro","12":"Dezembro"};

// ===================== STATE =====================
// Inicializa com dados embutidos (fallback)
let DATA=JSON.parse(document.getElementById("data-blob").textContent);
const state={mes:DATA.meses[DATA.meses.length-1],operador:"_ALL"};

// ===================== HELPERS =====================
function fmtH(v){if(!v)return"0h";const h=Math.floor(v),m=Math.round((v-h)*60);return m===0?h+"h":h+"h "+String(m).padStart(2,"0")+"m"}
function fmtNum(v,d){return Number(v||0).toFixed(d||0).replace(".",",")}
function formatMesLabel(ym){if(ym==="ANUAL")return{top:"Anual",sub:"Consolidado"};const[a,m]=ym.split("-");return{top:MES_NOMES[m]||m,sub:a}}
function $(id){return document.getElementById(id)}

// ===================== TOAST =====================
let toastTimer;
function showToast(msg,type){
  const t=$("toast");t.textContent=msg;t.className="toast "+type+" show";
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove("show"),4000);
}

// ===================== REFRESH =====================
async function refreshData(){
  const btn=$("btnRefresh");
  btn.classList.add("loading");
  btn.querySelector(".txt").textContent="Buscando…";
  try{
    // Detectar base URL do repositório (funciona no GitHub Pages)
    const base=window.location.href.replace(/\/[^/]*$/,"/");
    const manifestURL=base+"data/index.json?_="+Date.now();
    const res=await fetch(manifestURL);
    if(!res.ok) throw new Error("Manifesto não encontrado ("+res.status+")");
    const manifest=await res.json();

    // Quais meses novos existem?
    const currentMeses=new Set(DATA.meses);
    const allRemote=manifest.meses||[];
    const newMeses=allRemote.filter(m=>!currentMeses.has(m));

    // Baixar os JSONs de todos os meses remotos (para garantir dados atualizados)
    let updated=false;
    for(const ym of allRemote){
      try{
        const mRes=await fetch(base+"data/"+ym+".json?_="+Date.now());
        if(!mRes.ok) continue;
        const mData=await mRes.json();
        DATA.dados[ym]=mData.dados;
        updated=true;
      }catch(e){console.warn("Erro ao baixar "+ym+".json",e)}
    }

    // Atualizar ANUAL com o manifesto
    if(manifest.anual){
      DATA.dados["ANUAL"]=manifest.anual;
    }

    // Atualizar lista de meses e operadores
    DATA.meses=allRemote;
    if(manifest.operadores&&manifest.operadores.length) DATA.operadores=manifest.operadores;

    // Rebuild UI
    buildFilter();
    buildTabs(newMeses);
    if(!DATA.dados[state.mes]){state.mes=DATA.meses[DATA.meses.length-1]}
    render();

    if(newMeses.length>0){
      showToast("✓ "+newMeses.length+" novo(s) mês(es) encontrado(s): "+newMeses.join(", "),"success");
      btn.classList.add("done");
      btn.querySelector(".txt").textContent="Atualizado ✓";
    }else if(updated){
      showToast("✓ Dados atualizados com sucesso","success");
      btn.classList.add("done");
      btn.querySelector(".txt").textContent="Atualizado ✓";
    }else{
      showToast("Nenhum mês novo encontrado","");
      btn.querySelector(".txt").textContent="Atualizar";
    }
  }catch(e){
    console.error("Refresh error:",e);
    showToast("Sem dados remotos — usando dados embutidos","error");
    btn.querySelector(".txt").textContent="Atualizar";
  }finally{
    btn.classList.remove("loading");
    setTimeout(()=>{btn.classList.remove("done");btn.querySelector(".txt").textContent="Atualizar"},5000);
  }
}

$("btnRefresh").addEventListener("click",refreshData);

// ===================== TABS =====================
function buildTabs(highlightNew){
  const root=$("tabs");root.innerHTML="";
  const items=[...DATA.meses,"ANUAL"];
  const newSet=new Set(highlightNew||[]);
  items.forEach(ym=>{
    const lbl=formatMesLabel(ym);
    const b=document.createElement("button");
    let cls="tab";
    if(ym==="ANUAL") cls+=" tab-anual";
    if(ym===state.mes) cls+=" active";
    if(newSet.has(ym)) cls+=" tab-new";
    b.className=cls;b.dataset.ym=ym;
    b.innerHTML='<span>'+lbl.top+'</span><span class="tab-sub">'+lbl.sub+'</span>';
    b.addEventListener("click",()=>{state.mes=ym;document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.ym===ym));render()});
    root.appendChild(b);
  });
}

// ===================== OPERATOR FILTER =====================
function buildFilter(){
  const sel=$("operFilter");
  const current=sel.value||"_ALL";
  sel.innerHTML='<option value="_ALL">Todos os operadores</option>';
  (DATA.operadores||[]).forEach(op=>{
    const o=document.createElement("option");o.value=op;o.textContent=op.replace(/\./g," ");
    sel.appendChild(o);
  });
  sel.value=current;
  // Rebind (safe to call multiple times since we replace innerHTML)
  sel.onchange=function(e){state.operador=e.target.value;render()};
}

// ===================== RENDER KPIs =====================
function renderKPIs(b){
  const dias=b.dias_trabalhados,ht=dias*8,hu=dias*7;
  return '<div class="kpis">'
    +'<div class="kpi kpi-op"><div class="badge">⚙</div><div class="label">Horas operacionais</div><div class="value">'+fmtNum(b.horas_oper)+'<span class="unit">h</span></div><div class="meta">'+fmtH(b.horas_oper)+' totais em OPER</div></div>'
    +'<div class="kpi kpi-manut"><div class="badge">🛠</div><div class="label">Horas em manutenção</div><div class="value">'+fmtNum(b.horas_manut)+'<span class="unit">h</span></div><div class="meta">'+fmtH(b.horas_manut)+' · 6 tipos combinados</div></div>'
    +'<div class="kpi"><div class="badge">📅</div><div class="label">Dias trabalhados</div><div class="value">'+dias+'<span class="unit">dias</span></div><div class="meta">com lançamento de horas</div></div>'
    +'<div class="kpi"><div class="badge">⏱</div><div class="label">Horas totais (×8h)</div><div class="value">'+ht+'<span class="unit">h</span></div><div class="meta">'+dias+' dias × 8h</div></div>'
    +'<div class="kpi"><div class="badge">🕖</div><div class="label">Horas úteis (×7h)</div><div class="value">'+hu+'<span class="unit">h</span></div><div class="meta">'+dias+' dias × 7h</div></div>'
    +'<div class="kpi"><div class="badge">📋</div><div class="label">Ordens de serviço</div><div class="value">'+b.total_os+'<span class="unit">OS</span></div><div class="meta">distintas no período</div></div>'
    +'</div>';
}

// ===================== BAR CHART =====================
function renderChart(b,ym){
  const dias=b.por_dia;if(!dias||!dias.length)return'<div class="empty">Sem lançamentos</div>';
  let max=0;dias.forEach(d=>{const t=(d.oper_total||0)+(d.manut_total||0);if(t>max)max=t});
  if(max===0)max=8;const topo=Math.ceil(max/4)*4||4;
  const gv=[topo,topo*.75,topo*.5,topo*.25,0];
  const gh=gv.map(v=>'<div class="gline" data-v="'+fmtNum(v)+'h"></div>').join("");
  const cols=dias.map((d,i)=>{
    const opPct=(d.oper_total/topo)*100,mPct=(d.manut_total/topo)*100;
    const dd=JSON.stringify(d).replace(/"/g,"&quot;");
    const lbl=ym==="ANUAL"?d.dia:d.dia.replace(/^0/,"");
    return'<div class="bar-col"><div class="bar-stack"><div class="bar-pair">'
      +'<div class="bar bar-op" style="height:'+opPct+'%;animation-delay:'+i*15+'ms" data-day="'+dd+'" data-kind="op"></div>'
      +'<div class="bar bar-manut" style="height:'+mPct+'%;animation-delay:'+(i*15+8)+'ms" data-day="'+dd+'" data-kind="manut"></div>'
      +'</div></div><div class="bar-label">'+lbl+'</div></div>';
  }).join("");
  const minW=Math.max(dias.length*36,600);
  return'<div class="chart-legend"><span class="legend-item"><span class="swatch op"></span> Operação</span><span class="legend-item"><span class="swatch manut"></span> Manutenção</span><span class="legend-item" style="margin-left:auto;color:var(--text-dim)">passe o mouse para detalhes</span></div>'
    +'<div class="chart-scroll"><div class="bar-chart" style="min-width:'+minW+'px;padding-left:42px"><div class="bar-grid">'+gh+'</div>'+cols+'</div></div>';
}

// ===================== OS LIST =====================
function renderOS(b){
  const tipos=[{k:"OPER",...OPER_LABEL},{k:"CORR",...MANUT_LABELS.CORR},{k:"EM",...MANUT_LABELS.EM},{k:"PRED",...MANUT_LABELS.PRED},{k:"PREV",...MANUT_LABELS.PREV},{k:"SERV",...MANUT_LABELS.SERV},{k:"MODI",...MANUT_LABELS.MODI}];
  const rows=tipos.map(t=>{const c=b.os_por_tipo[t.k]||0;if(!c)return"";return'<div class="os-item"><span class="dot" style="background:'+t.cor+'"></span><div class="label"><span>'+t.k+'</span><span class="full">'+t.nome+'</span></div><span class="count">'+c+'</span></div>'}).join("")||'<div class="empty">Nenhuma OS</div>';
  return'<div class="os-summary"><span class="label">Total de OS</span><span class="val">'+b.total_os+'</span></div><div class="os-list">'+rows+'</div>';
}

// ===================== BREAKDOWN =====================
function renderBreakdown(b){
  return'<div class="breakdown">'+TIPOS_MANUT.map(k=>{const v=b.tipos[k]||0;const m=MANUT_LABELS[k];return'<div class="bd-row"><span class="swatch" style="background:'+m.cor+'"></span><div class="info"><span class="name">'+k+'</span><span class="full">'+m.nome+'</span></div><span class="v">'+fmtNum(v)+'h</span></div>'}).join("")+'</div>';
}

// ===================== MAIN RENDER =====================
function render(){
  const b=DATA.dados[state.mes]&&DATA.dados[state.mes][state.operador];
  if(!b){$("main").innerHTML='<div class="empty">Sem dados para esta seleção</div>';return}
  const lbl=formatMesLabel(state.mes);
  const opTitle=state.operador==="_ALL"?"Todos os operadores":state.operador.replace(/\./g," ");
  $("main").innerHTML=
    '<div class="section-head"><div><h2>'+lbl.top+' <span style="color:var(--text-dim);font-weight:500">· '+lbl.sub+'</span></h2><div class="sub">'+opTitle+' · '+b.total_os+' OS · '+fmtNum(b.horas_total)+'h registradas</div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><span class="pill"><span class="dot" style="background:var(--op)"></span>'+fmtNum(b.horas_oper)+'h operação</span><span class="pill"><span class="dot" style="background:var(--maint)"></span>'+fmtNum(b.horas_manut)+'h manutenção</span></div></div>'
    +renderKPIs(b)
    +'<div class="grid-2"><div class="card"><h3>Horas por dia</h3><div class="card-sub">Operação vs. Manutenção · passe o mouse sobre as barras para detalhamento</div>'+renderChart(b,state.mes)+'</div>'
    +'<div class="card"><h3>Ordens de Serviço por tipo</h3><div class="card-sub">Quantidade de OS distintas no período</div>'+renderOS(b)+'</div></div>'
    +'<div class="card" style="margin-top:16px"><h3>Detalhamento · Manutenção</h3><div class="card-sub">Horas totais em cada tipo de manutenção</div>'+renderBreakdown(b)+'</div>';
  bindTooltips();
  $("footStats").textContent=DATA.meses.length+" meses · "+(DATA.operadores||[]).length+" operadores";
}

// ===================== TOOLTIP =====================
const tip=$("tooltip");
function bindTooltips(){document.querySelectorAll(".bar-chart .bar").forEach(bar=>{bar.addEventListener("mouseenter",onEnter);bar.addEventListener("mousemove",onMove);bar.addEventListener("mouseleave",onLeave);bar.addEventListener("touchstart",onEnter,{passive:true})})}
function onEnter(e){const el=e.currentTarget;const day=JSON.parse(el.dataset.day.replace(/&quot;/g,'"'));tip.innerHTML=buildTT(day);tip.classList.add("show");placeT(e)}
function onMove(e){placeT(e)}
function onLeave(){tip.classList.remove("show")}
function placeT(e){const tw=tip.offsetWidth,th=tip.offsetHeight;let cx=e.clientX||0,cy=e.clientY||0;let x=cx+14,y=cy-th-12;if(x+tw>window.innerWidth-14)x=cx-tw-14;if(y<14)y=cy+16;tip.style.left=x+"px";tip.style.top=y+"px"}
function buildTT(day){
  const diaTxt="dia "+day.dia.replace(/^0/,"");
  const opH=day.OPER||0;
  const md=TIPOS_MANUT.map(t=>{const v=day[t]||0;if(v<=0)return"";const m=MANUT_LABELS[t];return'<div class="tt-row"><div class="lhs"><span class="swatch" style="background:'+m.cor+'"></span><span class="name">'+t+' · '+m.nome+'</span></div><span class="val">'+fmtH(v)+'</span></div>'}).join("");
  const total=(day.oper_total||0)+(day.manut_total||0);
  let h='<div class="tt-head"><span>Detalhes</span><span class="dia">'+diaTxt+'</span></div>';
  if(opH>0) h+='<div class="tt-section"><div class="tt-section-title"><span class="dot" style="background:var(--op)"></span>Operação</div><div class="tt-row"><div class="lhs"><span class="swatch" style="background:var(--op)"></span><span class="name">OPER · Operacional</span></div><span class="val">'+fmtH(opH)+'</span></div></div>';
  if(md) h+='<div class="tt-section"><div class="tt-section-title"><span class="dot" style="background:var(--maint)"></span>Manutenção</div>'+md+'</div>';
  h+='<div class="tt-total"><span>Total no dia</span><span class="val" style="font-family:\'JetBrains Mono\',monospace">'+fmtH(total)+'</span></div>';
  return h;
}

// ===================== INIT =====================
buildFilter();buildTabs();render();
window.addEventListener("scroll",()=>tip.classList.remove("show"),{passive:true});
window.addEventListener("resize",()=>tip.classList.remove("show"));

// Atualizar timestamp no rodapé
function updateTimestamp(){
  const now=new Date();
  const fmt=now.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const el=$("lastUpdate");
  if(el) el.textContent=fmt;
}
updateTimestamp();
setInterval(updateTimestamp,60000); // Atualiza a cada minuto

})();
